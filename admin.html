<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · Blog · Bernardo</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;600;700&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/blog.css">

  <link rel="icon" type="image/png" href="./favicon.png" sizes="32x32">
  <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any">
  <meta name="theme-color" content="#060807">
</head>

<body class="admin-body">

  <!-- =========================================================
       SIDEBAR — isolada, fixa, com sombra à direita
       ========================================================= -->
  <aside class="admin-sidebar" aria-label="Menu do painel">
    <div class="admin-sidebar-inner">
      <div class="admin-brand">
        <span class="admin-brand-label">Painel</span>
        <span class="admin-brand-title">Blog · <em>Bernardo</em></span>
      </div>

      <div class="admin-user">
        <div class="admin-user-avatar" aria-hidden="true">B</div>
        <div class="admin-user-info">
          <span class="admin-user-name">bernardolindo</span>
          <span class="admin-user-status">online</span>
        </div>
      </div>

      <nav class="admin-nav" aria-label="Navegação principal">
        <button class="admin-nav-item active" data-view="dashboard" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="3" y="3" width="7" height="9" rx="1"/>
            <rect x="14" y="3" width="7" height="5" rx="1"/>
            <rect x="14" y="12" width="7" height="9" rx="1"/>
            <rect x="3" y="16" width="7" height="5" rx="1"/>
          </svg>
          <span>Dashboard</span>
        </button>
        <button class="admin-nav-item" data-view="posts" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M4 6h16M4 12h16M4 18h10" stroke-linecap="round"/>
          </svg>
          <span>Posts</span>
        </button>
        <button class="admin-nav-item" data-view="editor" type="button" data-new>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M12 5v14M5 12h14" stroke-linecap="round"/>
          </svg>
          <span>Novo Post</span>
        </button>
      </nav>

      <button class="admin-logout" id="sidebarLogoutBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Sair da conta</span>
      </button>

      <div class="admin-sidebar-foot">
        <p class="admin-sidebar-foot-text">© Bernardo Iannini</p>
      </div>
    </div>
  </aside>

  <!-- =========================================================
       MAIN — topbar + content (isolados da sidebar)
       ========================================================= -->
  <div class="admin-main">

    <header class="admin-topbar" aria-label="Barra superior">
      <div class="admin-topbar-left">
        <h1 class="admin-topbar-title" id="adminTopbarTitle">Dashboard</h1>
        <span class="admin-topbar-sep" aria-hidden="true"></span>
        <span class="admin-topbar-crumb" id="adminTopbarCrumb">visão geral</span>
      </div>
      <div class="admin-topbar-right">
        <a class="admin-topbar-btn" href="blog.html" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M10 14L21 3M21 3h-7M21 3v7M19 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Ver site</span>
        </a>
        <button class="admin-topbar-btn admin-topbar-btn--danger" id="logoutBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Sair</span>
        </button>
      </div>
    </header>

    <main class="admin-content">
      <div class="admin-content-inner" id="adminContent">
        <!-- preenchido por JS -->
      </div>
    </main>
  </div>

  <script defer src="/js/transitions.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="js/blog-admin.js"></script>
</body>

</html>
