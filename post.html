<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecionando · Bernardo Iannini</title>
  <!-- Esta página existia para servir posts via ?slug=...
       A nova versão pré-renderiza cada post em /posts/<slug>.html.
       Mantida como redirect pra preservar links indexados. -->
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://bernardoiannini.com/blog.html" />
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var slug = params.get('slug') || params.get('post') || params.get('id');
      if (slug) {
        // Sanitiza o slug pra evitar open-redirect via aspas/quebras
        slug = String(slug).replace(/[^a-zA-Z0-9_-]/g, '');
        location.replace('/posts/' + slug + '.html');
      } else {
        location.replace('/blog.html');
      }
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=/blog.html">
</head>
<body>
  <p>Redirecionando para o <a href="/blog.html">blog</a>...</p>
</body>
</html>
