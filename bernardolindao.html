<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acesso Restrito</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;600;700&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/blog.css">

  <link rel="icon" type="image/png" href="./favicon.png" sizes="32x32">
  <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any">
  <meta name="theme-color" content="#060807">
</head>

<body class="login-body">
  <main class="login-card">
    <span class="login-logo">Painel Privado</span>

    <h1 class="login-title">
      Olá, <em style="font-style: italic; font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; color: var(--lime);">Bernardo</em>.
    </h1>
    <p class="login-sub">Acesso reservado ao autor do blog.</p>

    <form class="login-form" id="loginForm" autocomplete="off">
      <div class="login-field">
        <label for="loginUser">E-mail</label>
        <input type="email" id="loginUser" name="user" required autocomplete="username" spellcheck="false"/>
      </div>
      <div class="login-field">
        <label for="loginPass">Senha</label>
        <input type="password" id="loginPass" name="pass" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="login-submit">Entrar</button>
    </form>

    <p class="login-error" id="loginError" hidden>Usuário ou senha incorretos.</p>

    <a href="/" class="login-back">← voltar ao site</a>
  </main>

  <script defer src="/js/transitions.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="js/blog-auth.js"></script>
</body>

</html>
